<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Shield metallic gradient -->
    <linearGradient id="shieldGrad" x1="40" y1="20" x2="160" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="25%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#8a8a8a"/>
      <stop offset="75%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <!-- Shield inner gradient (slightly lighter) -->
    <linearGradient id="shieldInnerGrad" x1="50" y1="35" x2="150" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <!-- Z letter metallic gradient -->
    <linearGradient id="zGrad" x1="70" y1="75" x2="130" y2="135" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="30%" stop-color="#d8d8d8"/>
      <stop offset="60%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background circle (optional, for icon contexts) -->
  <circle cx="100" cy="100" r="98" fill="#0a0a0f"/>

  <!-- Shield outer border (metallic stroke) -->
  <path
    d="M100 15 L162 42 L162 95 C162 138 132 170 100 185 C68 170 38 138 38 95 L38 42 Z"
    fill="url(#shieldGrad)"
    filter="url(#shadow)"
  />

  <!-- Shield inner body -->
  <path
    d="M100 22 L156 47 L156 95 C156 134 128 164 100 178 C72 164 44 134 44 95 L44 47 Z"
    fill="url(#shieldInnerGrad)"
  />

  <!-- Shield inner highlight line (top-left edge) -->
  <path
    d="M100 22 L156 47 L156 68"
    stroke="#e8e8e8"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.4"
    fill="none"
  />

  <!-- Z letter — geometric, sharp, bold -->
  <path
    d="M70 78 L130 78 L130 90 L86 122 L130 122 L130 134 L70 134 L70 122 L114 90 L70 90 Z"
    fill="url(#zGrad)"
    filter="url(#glow)"
  />

  <!-- Thin metallic ring accent around shield -->
  <path
    d="M100 15 L162 42 L162 95 C162 138 132 170 100 185 C68 170 38 138 38 95 L38 42 Z"
    fill="none"
    stroke="#c0c0c0"
    stroke-width="1"
    opacity="0.25"
  />
</svg>
